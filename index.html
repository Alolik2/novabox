<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaBox — каталог</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:Arial,Helvetica,sans-serif}
header{border-bottom:1px solid #222;padding:20px 40px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:36px;font-weight:800}
.nav{display:flex;gap:20px;color:#bbb}
.hero{text-align:center;padding:70px 20px}
.hero h1{font-size:56px;margin-bottom:15px}
.hero p{font-size:20px;color:#aaa}
.catalog{max-width:1200px;margin:0 auto;padding:20px}
.catalog-top{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:25px}
.catalog-top h2{font-size:36px}
.search{padding:14px 18px;border-radius:12px;border:1px solid #333;background:#111;color:#fff;width:280px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.product{background:#0d0d0d;border:1px solid #222;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:14px}
.image{height:170px;border-radius:14px;background:linear-gradient(135deg,#1a1a1a,#333);display:flex;align-items:center;justify-content:center;color:#777;font-size:18px}
.product h3{font-size:20px}
.desc{color:#aaa;line-height:1.4;min-height:40px}
.price{font-size:24px;font-weight:800}
.btn{border:none;border-radius:12px;padding:14px;background:#fff;color:#000;font-weight:800;cursor:pointer}
.btn:hover{opacity:.85}
.cart{position:fixed;right:20px;bottom:20px;background:#fff;color:#000;border-radius:18px;padding:18px 22px;font-weight:800;box-shadow:0 10px 30px rgba(0,0,0,.4)}
footer{border-top:1px solid #222;text-align:center;padding:30px;color:#777;margin-top:80px}
@media(max-width:700px){
header{padding:18px;flex-direction:column;gap:12px}
.hero h1{font-size:42px}
.catalog-top{flex-direction:column;align-items:stretch}
.search{width:100%}
}
</style>
</head>
<body>

<header>
    <div class="logo">NovaBox</div>
    <div class="nav">
        <span>Каталог</span>
        <span>Доставка</span>
        <span>Контакты</span>
    </div>
</header>

<section class="hero">
    <h1>Каталог NovaBox</h1>
    <p>Первые товары для тестового запуска интернет-магазина.</p>
</section>

<section class="catalog">
    <div class="catalog-top">
        <h2>Популярные товары</h2>
        <input class="search" id="searchInput" type="text" placeholder="Поиск товара...">
    </div>

    <div class="grid" id="productGrid"></div>
</section>

<div class="cart" id="cartBox">Корзина: 0</div>

<footer>© 2026 NovaBox</footer>

<script>
const products = [
    {
        name: "LED-светильник",
        price: 1290,
        desc: "Настольный светильник для работы и дома."
    },
    {
        name: "USB-хаб",
        price: 890,
        desc: "Компактный USB-хаб для ноутбука и ПК."
    },
    {
        name: "Подставка для телефона",
        price: 490,
        desc: "Удобная подставка для смартфона."
    },
    {
        name: "Мини-увлажнитель",
        price: 1490,
        desc: "Компактный увлажнитель воздуха."
    },
    {
        name: "Ночник",
        price: 790,
        desc: "Мягкий свет для спальни и рабочего стола."
    },
    {
        name: "Коврик для мыши",
        price: 690,
        desc: "Большой коврик для комфортной работы."
    },
    {
        name: "Подставка для ноутбука",
        price: 1690,
        desc: "Складная подставка для охлаждения ноутбука."
    },
    {
        name: "Настольный штатив",
        price: 1190,
        desc: "Штатив для съёмки, стримов и видео."
    }
];

let cartCount = 0;

function renderProducts(list) {
    const grid = document.getElementById("productGrid");
    grid.innerHTML = "";

    list.forEach((product) => {
        const card = document.createElement("div");
        card.className = "product";

        card.innerHTML = `
            <div class="image">Фото товара</div>
            <h3>${product.name}</h3>
            <p class="desc">${product.desc}</p>
            <div class="price">${product.price.toLocaleString("ru-RU")} ₽</div>
            <button class="btn">В корзину</button>
        `;

        card.querySelector(".btn").addEventListener("click", () => {
            cartCount++;
            document.getElementById("cartBox").textContent = "Корзина: " + cartCount;
        });

        grid.appendChild(card);
    });
}

document.getElementById("searchInput").addEventListener("input", (event) => {
    const value = event.target.value.toLowerCase();

    const filtered = products.filter((product) =>
        product.name.toLowerCase().includes(value) ||
        product.desc.toLowerCase().includes(value)
    );

    renderProducts(filtered);
});

renderProducts(products);
</script>

</body>
</html>
