<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaBox</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    border-bottom:1px solid #333;
    padding:20px;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.hero{
    padding:100px 20px;
    text-align:center;
}

.hero h1{
    font-size:56px;
    margin-bottom:20px;
}

.hero p{
    color:#999;
    font-size:20px;
    margin-bottom:40px;
}

.button{
    display:inline-block;
    padding:15px 35px;
    background:white;
    color:black;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
}

footer{
    border-top:1px solid #333;
    text-align:center;
    color:#666;
    padding:30px;
    margin-top:100px;
}
</style>

</head>
<body>

<header>
    <div class="logo">
        NovaBox
    </div>
</header>

<section class="hero">
    <h1>NovaBox</h1>

    <p>
        Интернет-магазин товаров для дома, техники и удобной жизни.
    </p>

    <a class="button" href="#">
        Скоро открытие
    </a>
</section>

<footer>
    © 2026 NovaBox
</footer>

</body>
</html>
