<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaBox — каталог</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:#050505;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    border-bottom:1px solid #222;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    background:#050505;
    z-index:10;
}

.logo{
    font-size:36px;
    font-weight:800;
}

.nav{
    display:flex;
    gap:20px;
    color:#bbb;
}

.nav a{
    color:#bbb;
    text-decoration:none;
}

.nav a:hover{
    color:#fff;
}

.hero{
    text-align:center;
    padding:70px 20px 50px;
}

.hero h1{
    font-size:56px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    color:#aaa;
}

.catalog{
    max-width:1200px;
    margin:0 auto;
    padding:20px;
}

.catalog-top{
    display:flex;
    justify-content:space-between;
    gap:20px;
    align-items:center;
    margin-bottom:20px;
}

.catalog-top h2{
    font-size:36px;
}

.search{
    padding:14px 18px;
    border-radius:12px;
    border:1px solid #333;
    background:#111;
    color:#fff;
    width:280px;
}

.filters{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.filter-btn{
    border:1px solid #333;
    background:#0d0d0d;
    color:#ddd;
    padding:10px 14px;
    border-radius:999px;
    cursor:pointer;
    font-weight:700;
}

.filter-btn.active,
.filter-btn:hover{
    background:#fff;
    color:#000;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.product{
    background:#0d0d0d;
    border:1px solid #222;
    border-radius:18px;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.image{
    height:170px;
    border-radius:14px;
    background:linear-gradient(135deg,#1a1a1a,#333);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#777;
    overflow:hidden;
}

.image img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.product h3{
    font-size:20px;
}

.sku{
    color:#777;
    font-size:13px;
}

.desc{
    color:#aaa;
    line-height:1.4;
    min-height:42px;
}

.meta{
    display:flex;
    justify-content:space-between;
    gap:12px;
    color:#aaa;
    font-size:14px;
}

.stock-ok{
    color:#a6ffb8;
}

.stock-empty{
    color:#ff9c9c;
}

.price-row{
    display:flex;
    align-items:flex-end;
    gap:10px;
}

.price{
    font-size:24px;
    font-weight:800;
}

.old-price{
    color:#777;
    text-decoration:line-through;
    font-size:15px;
    margin-bottom:3px;
}

.actions{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.btn{
    border:none;
    border-radius:12px;
    padding:14px;
    background:#fff;
    color:#000;
    font-weight:800;
    cursor:pointer;
    text-align:center;
    text-decoration:none;
}

.btn:hover{
    opacity:.85;
}

.btn:disabled{
    background:#333;
    color:#888;
    cursor:not-allowed;
}

.btn-outline{
    border:1px solid #333;
    background:#151515;
    color:#fff;
}

.empty-result{
    color:#888;
    border:1px solid #222;
    border-radius:18px;
    padding:30px;
    background:#0d0d0d;
}

.cart-float{
    position:fixed;
    right:20px;
    bottom:20px;
    width:64px;
    height:64px;
    border-radius:50%;
    background:#fff;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    box-shadow:0 12px 35px rgba(0,0,0,.45);
    z-index:50;
}

.cart-float svg{
    width:30px;
    height:30px;
}

.cart-count{
    position:absolute;
    top:-6px;
    right:-6px;
    min-width:24px;
    height:24px;
    padding:0 6px;
    border-radius:999px;
    background:#ff3b3b;
    color:#fff;
    font-size:13px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid #050505;
}

.toast{
    position:fixed;
    left:50%;
    bottom:100px;
    transform:translateX(-50%);
    background:#fff;
    color:#000;
    padding:14px 18px;
    border-radius:12px;
    font-weight:800;
    display:none;
    z-index:60;
}

.footer-links{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

.footer-links a{
    color:#aaa;
    text-decoration:none;
}

.footer-links a:hover{
    color:#fff;
}

footer{
    border-top:1px solid #222;
    text-align:center;
    padding:30px;
    color:#777;
    margin-top:80px;
}

@media(max-width:700px){
    header{
        padding:18px;
        flex-direction:column;
        gap:12px;
    }

    .hero h1{
        font-size:40px;
    }

    .catalog-top{
        flex-direction:column;
        align-items:stretch;
    }

    .search{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">NovaBox</div>

    <nav class="nav">
        <a href="index.html">Каталог</a>
        <a href="cart.html">Корзина</a>
        <a href="privacy.html">Политика</a>
    </nav>
</header>

<section class="hero">
    <h1>Каталог NovaBox</h1>
    <p>Первые товары для тестового запуска интернет-магазина.</p>
</section>

<section class="catalog">
    <div class="catalog-top">
        <h2>Популярные товары</h2>
        <input class="search" id="searchInput" type="text" placeholder="Поиск товара...">
    </div>

    <div class="filters" id="categoryFilters"></div>

    <div class="grid" id="productGrid"></div>
</section>

<a class="cart-float" href="cart.html" aria-label="Открыть корзину">
    <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 7h14l-2 8H9L7 7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M7 7 6.2 4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="10" cy="20" r="1.5" fill="currentColor"/>
        <circle cx="18" cy="20" r="1.5" fill="currentColor"/>
    </svg>
    <span class="cart-count" id="cartCount">0</span>
</a>

<div class="toast" id="toast">Товар добавлен в корзину</div>

<footer>
    <div class="footer-links">
        <a href="privacy.html">Политика обработки персональных данных</a>
        <a href="consent.html">Согласие на обработку персональных данных</a>
    </div>
    © 2026 NovaBox · novaboxmarket.ru
</footer>

<script src="products.js"></script>

<script>
let activeCategory = "Все";

function getAllProducts(){
    if(!Array.isArray(window.NOVABOX_PRODUCTS)){
        return [];
    }

    return window.NOVABOX_PRODUCTS;
}

function isProductActive(product){
    return product && product.status === "active";
}

function getProducts(){
    return getAllProducts().filter(isProductActive);
}

function getCart(){
    const raw = localStorage.getItem("novabox_cart");

    if(!raw){
        return [];
    }

    try{
        const parsed = JSON.parse(raw);

        if(!Array.isArray(parsed)){
            return [];
        }

        return parsed.map(item => ({
            id: Number(item.id),
            qty: Math.max(1, Number(item.qty) || 1)
        })).filter(item => item.id > 0);
    }catch(error){
        localStorage.removeItem("novabox_cart");
        return [];
    }
}

function saveCart(cart){
    localStorage.setItem("novabox_cart", JSON.stringify(cart));
}

function updateCartCount(){
    const products = getProducts();
    const cart = getCart().filter(item => products.some(product => product.id === item.id));
    const count = cart.reduce((sum,item)=>sum + item.qty,0);

    saveCart(cart);
    document.getElementById("cartCount").textContent = count;
}

function showToast(text){
    const toast = document.getElementById("toast");
    toast.textContent = text;
    toast.style.display = "block";

    setTimeout(()=>{
        toast.style.display = "none";
    },1200);
}

function addToCart(product){
    if(!isProductActive(product)){
        showToast("Товар недоступен");
        return;
    }

    if(product.stock <= 0){
        showToast("Товара нет в наличии");
        return;
    }

    const cart = getCart();
    const existing = cart.find(item=>item.id === product.id);

    if(existing){
        if(existing.qty >= product.stock){
            showToast("Больше нет на складе");
            return;
        }

        existing.qty++;
    }else{
        cart.push({id:product.id, qty:1});
    }

    saveCart(cart);
    updateCartCount();
    showToast("Товар добавлен в корзину");
}

function formatMoney(value){
    return Number(value).toLocaleString("ru-RU") + " ₽";
}

function createImageHtml(product){
    if(product.image){
        return `<img src="${product.image}" alt="${product.name}">`;
    }

    return "Фото товара";
}

function renderCategories(){
    const filters = document.getElementById("categoryFilters");
    const products = getProducts();
    const categories = ["Все", ...new Set(products.map(product=>product.category))];

    filters.innerHTML = "";

    categories.forEach(category=>{
        const button = document.createElement("button");
        button.type = "button";
        button.className = "filter-btn" + (category === activeCategory ? " active" : "");
        button.textContent = category;

        button.addEventListener("click",()=>{
            activeCategory = category;
            renderCategories();
            renderProducts();
        });

        filters.appendChild(button);
    });
}

function getFilteredProducts(){
    const searchValue = document.getElementById("searchInput").value.toLowerCase().trim();

    return getProducts().filter(product=>{
        const categoryMatch = activeCategory === "Все" || product.category === activeCategory;

        const searchMatch =
            product.name.toLowerCase().includes(searchValue) ||
            product.desc.toLowerCase().includes(searchValue) ||
            product.sku.toLowerCase().includes(searchValue) ||
            product.category.toLowerCase().includes(searchValue);

        return categoryMatch && searchMatch;
    });
}

function renderProducts(){
    const grid = document.getElementById("productGrid");
    const products = getFilteredProducts();

    grid.innerHTML = "";

    if(products.length === 0){
        grid.innerHTML = '<div class="empty-result">Товары не найдены.</div>';
        return;
    }

    products.forEach(product=>{
        const card = document.createElement("div");
        card.className = "product";

        const stockClass = product.stock > 0 ? "stock-ok" : "stock-empty";
        const stockText = product.stock > 0 ? `В наличии: ${product.stock} шт.` : "Нет в наличии";

        card.innerHTML = `
            <div class="image">${createImageHtml(product)}</div>
            <div class="sku">Артикул: ${product.sku}</div>
            <h3>${product.name}</h3>
            <p class="desc">${product.desc}</p>

            <div class="meta">
                <span>${product.category}</span>
                <span class="${stockClass}">${stockText}</span>
            </div>

            <div class="price-row">
                <div class="price">${formatMoney(product.price)}</div>
                ${product.oldPrice ? `<div class="old-price">${formatMoney(product.oldPrice)}</div>` : ""}
            </div>

            <div class="actions">
                <a class="btn btn-outline" href="product.html?id=${product.id}">Подробнее</a>
                <button class="btn" type="button" ${product.stock <= 0 ? "disabled" : ""}>
                    ${product.stock <= 0 ? "Нет в наличии" : "В корзину"}
                </button>
            </div>
        `;

        card.querySelector("button.btn").addEventListener("click",()=>addToCart(product));
        grid.appendChild(card);
    });
}

document.getElementById("searchInput").addEventListener("input", renderProducts);

renderCategories();
renderProducts();
updateCartCount();
</script>

</body>
</html>
